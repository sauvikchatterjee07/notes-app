name: Deploy Notes App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.KEY }}
          port: 22
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            nvm use 20 || nvm install 20

            if [ ! -d "$HOME/notes-app" ]; then
              git clone https://github.com/sauvikchatterjee07/notes-app.git
            fi

            cd ~/notes-app
            git fetch origin
            git reset --hard origin/main

            # FRONTEND
            cd frontend
            npm ci
            npm run build

            sudo rm -rf /var/www/html/*
            sudo cp -r dist/* /var/www/html/

            # BACKEND
            cd ../backend
            npm ci
            npm install -g pm2

            echo '${{ secrets.BACKEND_ENV }}' > .env

            pm2 restart notes-backend || pm2 start server.js --name notes-backend
            pm2 save
