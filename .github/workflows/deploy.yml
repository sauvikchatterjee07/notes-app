name: Deploy Notes App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code from gitHub
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Backend
        run: |
          docker build -t sauvikxdocker/my-backend:latest ./backend
      - name: Push Backend to DockerHub
        run: |
          docker push sauvikxdocker/my-backend:latest
      - name: Build frontend
        run: |
          docker build -t sauvikxdocker/my-frontend:latest ./frontend
      - name: Push frontend to Dockerhub
        run: |
          docker push sauvikxdocker/my-frontend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.KEY }}
          port: 22
          script: |
            cd /home/ubuntu/my-app

            docker compose pull

            docker compose up -d

            docker image prune -af
